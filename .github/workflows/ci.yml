name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iriefishmongers
          POSTGRES_PASSWORD: iriefishmongers
          POSTGRES_DB: iriefishmongers
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iriefishmongers"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      PORT: 3001
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://iriefishmongers:iriefishmongers@localhost:5432/iriefishmongers?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-test-access-secret-at-least-32-characters-long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-characters-long
      JWT_REFRESH_EXPIRES_IN: 7d
      APP_BASE_URL: http://localhost:3001
      WIPAY_API_URL: https://tx.wipayfinancial.com/plugins/payments
      WIPAY_ACCOUNT_NUMBER: ci-test-account-number
      WIPAY_API_KEY: ci-test-wipay-key
      # Non-secret CI test values for the remaining env-validated vars the e2e
      # suite needs when it boots the full AppModule (no backend/.env on CI).
      # CORS_ORIGIN must include the origin cors.e2e-spec asserts (localhost:3002)
      # and must not be '*' (credentialed CORS).
      CORS_ORIGIN: http://localhost:3000,http://localhost:3002
      SENDGRID_API_KEY: SG.ci-test-sendgrid-key
      SENDGRID_FROM_EMAIL: no-reply@iriefishmongers.test
      FCM_SERVER_KEY: ci-test-fcm-server-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate -w backend

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # NEXT_PUBLIC_* are inlined into the client bundle at build time and
          # are not secrets. apps/admin-dashboard/lib/env.ts throws in a
          # production build if these are unset; supply non-secret CI values so
          # `next build` can prerender pages like /login on the clean runner.
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_ENVIRONMENT: test
          NEXT_PUBLIC_APP_URL: http://localhost:3002

      - name: Apply database migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Seed reference data
        run: npx prisma db seed
        working-directory: backend

      - name: Test with coverage
        run: npm run test:cov

      - name: Run e2e tests
        run: npm run test:e2e -w backend
